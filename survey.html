n:center;padding:48px 28px}.status-icon{margin-bottom:16px;font-size:3rem}.status-card h2{color:var(--hmc-blue);margin-bottom:10px;font-size:1.4rem;font-weight:700}.status-card p{color:var(--text-muted);font-size:.95rem;line-height:1.7}#loading{text-align:center;color:var(--text-muted);padding:60px 0}.spinner{border:3px solid var(--border);border-top-color:var(--hmc-blue);border-radius:50%;width:40px;height:40px;margin:0 auto 16px;animation:.8s linear infinite spin}@keyframes spin{to{transform:rotate(360deg)}}.site-footer{text-align:center;color:var(--text-muted);margin-top:40px;font-size:.8rem}@media (width<=480px){.survey-header,.question-block{padding:20px 16px}.site-header h1{font-size:1rem}}</style><body>
